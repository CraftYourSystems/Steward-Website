<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Deep purple background gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3D1A8A"/>
      <stop offset="100%" stop-color="#1A0845"/>
    </radialGradient>
    <!-- Gold gradient for the S -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C880"/>
      <stop offset="50%" stop-color="#EEB76F"/>
      <stop offset="100%" stop-color="#C9903A"/>
    </linearGradient>
    <!-- Aqua gradient for the bar chart bars -->
    <linearGradient id="aqua-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3DBEAA"/>
      <stop offset="100%" stop-color="#A8E6D7"/>
    </linearGradient>
  </defs>

  <!-- Background circle — deep purple -->
  <circle cx="32" cy="32" r="31" fill="url(#bg-grad)"/>

  <!-- Aqua ring border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#A8E6D7" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- 
    S letter shape drawn as a stylised path:
    A golden S curve with the lower half opening to the right
  -->
  <text
    x="32" y="38"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="36"
    fill="url(#gold-grad)"
    letter-spacing="-1"
  >S</text>

  <!-- Bar chart bars (3 rising bars, aqua/teal — exactly like logo) -->
  <!-- Bar 1 (shortest) -->
  <rect x="18" y="44" width="5" height="7" rx="1.5" fill="url(#aqua-grad)" opacity="0.9"/>
  <!-- Bar 2 (medium) -->
  <rect x="25" y="40" width="5" height="11" rx="1.5" fill="url(#aqua-grad)" opacity="0.9"/>
  <!-- Bar 3 (tallest) -->
  <rect x="32" y="36" width="5" height="15" rx="1.5" fill="url(#aqua-grad)" opacity="0.9"/>

  <!-- Arrow tip (gold upward-right arrow) -->
  <path
    d="M38 34 L44 28 M44 28 L44 33 M44 28 L39 28"
    stroke="url(#gold-grad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>